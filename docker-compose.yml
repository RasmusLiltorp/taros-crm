services:

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    command: ["--migrationsDir=/pb_migrations", "--hooksDir=/pb_hooks"]
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
      PB_SMTP_HOST: ${PB_SMTP_HOST}
      PB_SMTP_USER: ${PB_SMTP_USER}
      PB_SMTP_PASS: ${PB_SMTP_PASS}
      PB_SENDER_EMAIL: ${PB_SENDER_EMAIL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - pocketbase_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks
    ports:
      - "127.0.0.1:8090:8090"  # MED-1: bind to localhost only — not exposed to the internet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://pocketbase:8090}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://pocketbase:8090}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pocketbase_data:
